{{- if .Values.backup.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-backups
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.backup.pvcSize }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-db-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: {{ .Values.backup.image }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  TS=$(date +%Y%m%d-%H%M%S)
                  pg_dump "$DATABASE_URL" | gzip > /backups/eaios-$TS.sql.gz
                  echo "backup written: eaios-$TS.sql.gz ($(du -h /backups/eaios-$TS.sql.gz | cut -f1))"
                  # retention
                  find /backups -name 'eaios-*.sql.gz' -mtime +{{ .Values.backup.keepDays }} -delete
              envFrom:
                - secretRef: { name: {{ .Release.Name }}-secrets }
              volumeMounts:
                - { name: backups, mountPath: /backups }
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backups
{{- end }}

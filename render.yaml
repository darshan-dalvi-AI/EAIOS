# Render.com blueprint — deploys EAIOS as one free web service.
# Dashboard → New → Blueprint → pick this repo → Apply.
# After the first deploy, set OPENAI_API_KEY (OpenRouter key from
# https://openrouter.ai/keys) in the service's Environment tab for real
# answers; without it the platform runs on the deterministic mock LLM
# (still fully demoable). The default model below is OpenRouter's free
# Llama 3.3 70B tier ($0; can 429 at peak — add credits for paid models).
#
# Free-plan notes: the service sleeps after ~15 min idle (first request then
# takes ~1 min) and the SQLite database is ephemeral — SEED_ON_START=1
# repopulates the demo corpus automatically on every fresh boot.

services:
  - type: web
    name: eaios
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.web
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_ON_START
        value: "1"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: LLM_PROVIDER
        value: auto            # auto → uses OPENAI_API_KEY when set, mock otherwise
      # OpenRouter: ONE key for GPT, Claude, Gemini, DeepSeek, Qwen, Llama, Phi.
      # Switch models live in Settings → AI Model. Free key: https://openrouter.ai/keys
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENAI_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: TEMPERATURE
        value: "0.3"
      - key: OPENAI_API_KEY
        sync: false            # paste your OpenRouter key in the dashboard (never committed)

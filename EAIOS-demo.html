<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#05070f" />

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>EAIOS — Enterprise AI Operating System | Hybrid RAG & Multi-Agent Platform</title>
    <meta name="description" content="EAIOS is an enterprise AI operating system: hybrid multimodal RAG with cited answers, nine AI agents, a knowledge graph, enterprise search and visual automations." />
    <meta name="keywords" content="enterprise AI, AI operating system, hybrid RAG, multimodal RAG, multi-agent AI, knowledge graph, enterprise search, graph orchestrator, AI agents, EAIOS" />
    <meta name="author" content="Darshan Dalvi" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://eaios.onrender.com/" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- ── Open Graph (Facebook / LinkedIn / WhatsApp) ─────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eaios.onrender.com/" />
    <meta property="og:site_name" content="EAIOS" />
    <meta property="og:title" content="EAIOS — Enterprise AI Operating System" />
    <meta property="og:description" content="Hybrid multimodal RAG, nine cooperating AI agents, knowledge graph, enterprise search and automations — a full AI operating system in your browser." />
    <meta property="og:image" content="https://eaios.onrender.com/og-image.png" />

    <!-- ── X (Twitter) Cards ───────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EAIOS — Enterprise AI Operating System" />
    <meta name="twitter:description" content="Hybrid multimodal RAG, nine AI agents, knowledge graph, enterprise search and automations — a full AI operating system in your browser." />
    <meta name="twitter:image" content="https://eaios.onrender.com/og-image.png" />

    <!-- ── Structured data: identity + software + FAQ ──────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://eaios.onrender.com/#org",
          "name": "EAIOS",
          "url": "https://eaios.onrender.com/",
          "logo": "https://eaios.onrender.com/eaios-icon.svg",
          "sameAs": ["https://github.com/darshan-dalvi-AI/EAIOS"],
          "founder": { "@type": "Person", "name": "Darshan Dalvi", "url": "https://github.com/darshan-dalvi-AI" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "EAIOS — Enterprise AI Operating System",
          "url": "https://eaios.onrender.com/",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web browser",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "description": "Enterprise AI operating system combining hybrid multimodal RAG, nine cooperating AI agents, a self-building knowledge graph, enterprise search, visual automations and observability in an OS-metaphor web interface.",
          "featureList": "Hybrid multimodal RAG, Multi-agent AI with parallel semantic routing, Structured table-to-SQL extraction, Knowledge graph, Enterprise search, Self-correcting SQL assistant, PII access auditing, Checkpointed resumable agent runs, OpenRouter multi-model support, Visual workflow automations with human-in-the-loop approvals, Voice assistant, Observability traces",
          "author": { "@id": "https://eaios.onrender.com/#org" }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is EAIOS?",
              "acceptedAnswer": { "@type": "Answer", "text": "EAIOS is an enterprise AI operating system that runs in the browser. It combines hybrid multimodal RAG, nine cooperating AI agents, a knowledge graph, enterprise search, visual automations and observability behind a desktop-style interface with windows, a taskbar and a command palette." }
            },
            {
              "@type": "Question",
              "name": "How does the hybrid RAG engine answer questions?",
              "acceptedAnswer": { "@type": "Answer", "text": "Uploaded documents are parsed, chunked, embedded and indexed twice — a BM25 keyword index and a vector index. At question time both are searched and fused with Reciprocal Rank Fusion, and the best passages are given to a large language model which must answer with citations and a confidence score." }
            },
            {
              "@type": "Question",
              "name": "What happens to tables inside my documents?",
              "acceptedAnswer": { "@type": "Answer", "text": "Complex and nested tables in PDFs, Word files, spreadsheets and slides are extracted as structured data and materialised into real SQL tables at ingest. The SQL agent queries them directly — precise aggregations instead of fuzzy text retrieval — and each table stays citable in search." }
            },
            {
              "@type": "Question",
              "name": "What do the nine AI agents do?",
              "acceptedAnswer": { "@type": "Answer", "text": "An LLM semantic router reads each request and fans independent subtasks out to specialists — document, SQL, research, email, report, analytics, memory and coding — which run in parallel where possible. Their results are merged into one cited answer, and every run is checkpointed so an interrupted request resumes where it stopped." }
            },
            {
              "@type": "Question",
              "name": "What is the knowledge graph used for?",
              "acceptedAnswer": { "@type": "Answer", "text": "At ingest time EAIOS extracts entities such as people, organisations, amounts and concepts, and links them by co-occurrence. The graph can be explored visually and is used to answer relational questions like how two entities are connected, with evidence passages." }
            },
            {
              "@type": "Question",
              "name": "Which language models does EAIOS support?",
              "acceptedAnswer": { "@type": "Answer", "text": "One OpenRouter key unlocks GPT, Claude, Gemini, DeepSeek, Qwen, Llama and Phi — switchable live from Settings. EAIOS also runs fully local models through Ollama and keeps a deterministic mock fallback so the platform always answers." }
            },
            {
              "@type": "Question",
              "name": "How does EAIOS protect sensitive data?",
              "acceptedAnswer": { "@type": "Answer", "text": "Every request passes JWT authentication, role-based access control and rate limiting. Sensitive entities in the knowledge graph — people, email addresses, phone numbers — are classified as PII, and any agent or API access to them is flagged in an append-only audit log and on the live security feed." }
            },
            {
              "@type": "Question",
              "name": "Is EAIOS open source and can I run it myself?",
              "acceptedAnswer": { "@type": "Answer", "text": "Yes. The full source is on GitHub with one-command local start, Docker Compose, a Render blueprint for free cloud deployment and a Helm chart for Kubernetes." }
            }
          ]
        }
      ]
    }
    </script>

    <noscript>
      <main style="font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #111">
        <h1>EAIOS — Enterprise AI Operating System</h1>
        <p>
          EAIOS is an enterprise AI operating system that runs entirely in the browser. It combines a
          hybrid multimodal RAG engine, nine cooperating AI agents, a self-building knowledge graph,
          enterprise search, visual workflow automations and full observability behind a desktop-style
          interface with windows, a taskbar and a command palette.
        </p>
        <h2>How it works</h2>
        <p>
          Upload company documents — PDFs, Word files, spreadsheets, presentations or images — and the
          ingestion pipeline parses, chunks, embeds and indexes them with both BM25 keyword search and
          vector similarity. Questions are routed by a graph orchestrator: a planning agent decomposes the
          request, specialist agents (document, SQL, research, email, report, analytics, memory, coding)
          run in parallel where possible, and answers stream back with citations and confidence scores.
          Complex and nested tables are extracted as structured data into real SQL tables the SQL agent
          queries directly. Entities extracted at ingest form a knowledge graph that answers relational
          questions with evidence; sensitive entities (people, emails, phone numbers) are classified as PII
          and every access to them is flagged in an append-only audit log. Runs are checkpointed per
          conversation, so interrupted requests resume where they stopped.
        </p>
        <p>
          One OpenRouter key unlocks GPT, Claude, Gemini, DeepSeek, Qwen, Llama and Phi — switchable live
          from Settings — alongside fully local Ollama models and a deterministic fallback so it always
          answers. Source code, documentation, a Docker setup, a
          Render blueprint and a Kubernetes Helm chart are available on
          <a href="https://github.com/darshan-dalvi-AI/EAIOS">GitHub</a>.
        </p>
        <p>Please enable JavaScript to launch the interactive operating system.</p>
      </main>
    </noscript>

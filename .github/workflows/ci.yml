name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch: {}  # manual runs (also gates the deploy job)

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install
      - run: npm run build

  # Build images always; push to GHCR only on main (uses the built-in token — no extra secrets).
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    env:
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        run: |
          echo "repo=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ steps.meta.outputs.repo }}-backend:latest
            ${{ steps.meta.outputs.repo }}-backend:${{ steps.meta.outputs.sha }}
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ steps.meta.outputs.repo }}-frontend:latest
            ${{ steps.meta.outputs.repo }}-frontend:${{ steps.meta.outputs.sha }}

  # Staged deploy — manual trigger only. Add a KUBE_CONFIG repo secret
  # (base64 kubeconfig) before running; the job upgrades the Helm release.
  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [docker]
    environment: production   # add reviewers in repo Settings → Environments for approval gating
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Configure cluster access
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "::error::KUBE_CONFIG secret not set — add a base64-encoded kubeconfig"; exit 1
          fi
          mkdir -p ~/.kube && echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Helm upgrade
        run: |
          helm upgrade --install eaios deploy/helm/eaios \
            --namespace eaios --create-namespace \
            --set image.backend=ghcr.io/${GITHUB_REPOSITORY,,}-backend \
            --set image.frontend=ghcr.io/${GITHUB_REPOSITORY,,}-frontend \
            --set image.tag=${GITHUB_SHA::7} \
            --wait --timeout 5m

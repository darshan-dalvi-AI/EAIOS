version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eaios
      POSTGRES_PASSWORD: eaios_dev_password
      POSTGRES_DB: eaios
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eaios"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://eaios:eaios_dev_password@postgres:5432/eaios
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_started }
    volumes:
      - ./backend/app:/code/app
      - upload_data:/code/uploads

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]

  # Optional local LLM — start with: docker compose --profile local-llm up
  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    ports: ["11434:11434"]
    volumes: [ollama_data:/root/.ollama]

volumes:
  pgdata:
  qdrant_data:
  ollama_data:
  upload_data:
